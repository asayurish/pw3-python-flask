<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plus Ultra Hub</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('home') }}">Plus Ultra Hub</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}">Início</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('seasondois') }}">Temporada 2</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('seasonoito') }}">Temporada 8</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('cadhero') }}">Cadastrar Episódio</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO -->
    <main class="container mt-4">
        {% block content %}
        {% endblock content %}
    </main>

    <!-- FOOTER -->
    <footer>
        <hr>
        <p style="text-align: center;">&copy; 2026 - Plus Ultra Hub - Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
